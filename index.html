<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四大板块深度研报</title>
    <style>
        /* VS Code Light Theme */
        :root {
            --bg: #ffffff;
            --bg-secondary: #f3f3f3;
            --bg-tertiary: #ececec;
            --fg: #000000;
            --fg-secondary: #616661;
            --border: #d4d4d4;
            --accent: #0066cc;
            --accent-bg: #cde4f7;
            --code-bg: #f5f5f5;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--fg);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .subtitle {
            color: var(--fg-secondary);
            font-size: 12px;
        }
        
        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        
        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* Calendar */
        .calendar-section {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 16px;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .calendar-header h2 {
            font-size: 13px;
            font-weight: 600;
        }
        
        .calendar-nav {
            display: flex;
            gap: 4px;
        }
        
        .calendar-nav button {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 2px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
        }
        
        .calendar-day-header {
            background: var(--bg-secondary);
            padding: 4px;
            text-align: center;
            font-size: 10px;
            color: var(--fg-secondary);
        }
        
        .calendar-day {
            background: var(--bg);
            min-height: 32px;
            padding: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        
        .calendar-day:hover {
            background: var(--bg-secondary);
        }
        
        .calendar-day.other-month {
            color: var(--fg-secondary);
            background: var(--bg-secondary);
        }
        
        .calendar-day.today {
            background: var(--accent-bg);
        }
        
        .calendar-day.has-update {
            font-weight: 600;
        }
        
        .calendar-day.has-update::after {
            content: "●";
            color: var(--accent);
            font-size: 8px;
            float: right;
        }
        
        /* Report List */
        .report-list {
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .report-list h2 {
            font-size: 13px;
            font-weight: 600;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        
        .report-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }
        
        .report-item:last-child {
            border-bottom: none;
        }
        
        .report-item:hover {
            background: var(--bg-secondary);
        }
        
        .report-item.active {
            background: var(--accent-bg);
        }
        
        .report-icon {
            font-size: 16px;
        }
        
        .report-title {
            font-size: 13px;
            font-weight: 500;
        }
        
        .report-date {
            font-size: 11px;
            color: var(--fg-secondary);
            margin-left: auto;
        }
        
        /* Preview Window */
        .preview-section {
            border: 1px solid var(--border);
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        
        .preview-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        
        .preview-tabs {
            display: flex;
            gap: 4px;
            flex: 1;
        }
        
        .preview-tab {
            padding: 4px 12px;
            font-size: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
        }
        
        .preview-tab:hover {
            background: var(--bg-tertiary);
        }
        
        .preview-tab.active {
            background: var(--accent-bg);
            border-color: var(--accent);
        }
        
        .preview-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            max-height: 70vh;
        }
        
        /* Markdown Styles */
        .preview-content h1 { font-size: 18px; margin: 0 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .preview-content h2 { font-size: 15px; margin: 24px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .preview-content h3 { font-size: 14px; margin: 16px 0 8px; }
        .preview-content p { margin: 12px 0; }
        .preview-content ul, .preview-content ol { margin: 12px 0 12px 20px; }
        .preview-content li { margin: 4px 0; font-size: 13px; }
        .preview-content a { color: var(--accent); text-decoration: none; }
        .preview-content a:hover { text-decoration: underline; }
        .preview-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 12px; }
        .preview-content th, .preview-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
        .preview-content th { background: var(--bg-secondary); }
        .preview-content strong { font-weight: 600; }
        
        /* Footer */
        footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--fg-secondary);
            font-size: 11px;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--fg-secondary);
        }
        
        /* Responsive */
        @media (max-width: 800px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            .preview-content {
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>四大板块深度研报</h1>
                <p class="subtitle">咖啡机器人 · SMT智慧工厂 · 机械臂 · 具身智能</p>
            </div>
        </header>
        
        <div class="main-layout">
            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Calendar -->
                <div class="calendar-section">
                    <div class="calendar-header">
                        <h2>更新日历</h2>
                        <div class="calendar-nav">
                            <button onclick="changeMonth(-1)">◀</button>
                            <button onclick="changeMonth(1)">▶</button>
                        </div>
                    </div>
                    <div id="calendarTitle" style="font-size:12px; text-align:center; margin-bottom:8px; color:var(--fg-secondary);"></div>
                    <div class="calendar-grid" id="calendar"></div>
                </div>
                
                <!-- Report List -->
                <div class="report-list">
                    <h2>研报列表</h2>
                    <div class="report-item active" onclick="showReport('coffee')">
                        <span class="report-icon">☕</span>
                        <span class="report-title">咖啡机器人</span>
                        <span class="report-date">03-08</span>
                    </div>
                    <div class="report-item" onclick="showReport('smt')">
                        <span class="report-icon">🏭</span>
                        <span class="report-title">SMT智慧工厂</span>
                        <span class="report-date">03-08</span>
                    </div>
                    <div class="report-item" onclick="showReport('robotic')">
                        <span class="report-icon">🦾</span>
                        <span class="report-title">机械臂</span>
                        <span class="report-date">03-08</span>
                    </div>
                    <div class="report-item" onclick="showReport('embodied')">
                        <span class="report-icon">🤖</span>
                        <span class="report-title">具身智能</span>
                        <span class="report-date">03-08</span>
                    </div>
                </div>
            </div>
            
            <!-- Preview Window -->
            <div class="preview-section">
                <div class="preview-header">
                    <span id="previewTitle" style="font-weight:600; font-size:13px;">☕ 咖啡机器人行业深度研究报告</span>
                </div>
                <div class="preview-content" id="previewContent">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>每天自动更新 · 芝加哥时间 10:00</p>
        </footer>
    </div>
    
    <script>
        // Calendar Data
        const updates = {
            '2026-03-08': { coffee: true, smt: true, robotic: true, embodied: true }
        };
        
        const reportMeta = {
            coffee: { title: '☕ 咖啡机器人行业深度研究报告', file: 'research_coffee_robot.md' },
            smt: { title: '🏭 SMT智慧工厂行业发展研究报告', file: 'research_smt.md' },
            robotic: { title: '🦾 机械臂行业深度研究报告', file: 'research_robotic_arm.md' },
            embodied: { title: '🤖 具身智能行业深度研究报告', file: 'research_embodied_ai.md' }
        };
        
        let currentMonth = new Date(2026, 2, 1);
        let currentReport = 'coffee';
        
        // Calendar
        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            
            document.getElementById('calendarTitle').textContent = 
                `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            let html = '';
            const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
            dayNames.forEach(d => {
                html += `<div class="calendar-day-header">${d}</div>`;
            });
            
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${prevMonthDays - i}</div>`;
            }
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
                const dayUpdates = updates[dateKey] || {};
                const hasUpdate = Object.keys(dayUpdates).length > 0;
                
                html += `<div class="calendar-day${isToday ? ' today' : ''}${hasUpdate ? ' has-update' : ''}" 
                    onclick="selectDate('${dateKey}')">${d}</div>`;
            }
            
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remaining = totalCells - firstDay - daysInMonth;
            for (let d = 1; d <= remaining; d++) {
                html += `<div class="calendar-day other-month">${d}</div>`;
            }
            
            document.getElementById('calendar').innerHTML = html;
        }
        
        function changeMonth(delta) {
            currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + delta, 1);
            renderCalendar();
        }
        
        function selectDate(dateKey) {
            const dayUpdates = updates[dateKey];
            if (dayUpdates) {
                const firstReport = Object.keys(dayUpdates).find(k => dayUpdates[k]);
                if (firstReport) {
                    showReport(firstReport);
                    // Update active state in report list
                    document.querySelectorAll('.report-item').forEach(item => item.classList.remove('active'));
                    document.querySelectorAll('.report-item')[Object.keys(reportMeta).indexOf(firstReport)].classList.add('active');
                }
            }
        }
        
        // Report Viewer
        async function showReport(key) {
            currentReport = key;
            
            // Update active state
            document.querySelectorAll('.report-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.report-item')[Object.keys(reportMeta).indexOf(key)].classList.add('active');
            
            // Update title
            document.getElementById('previewTitle').textContent = reportMeta[key].title;
            
            // Show loading
            document.getElementById('previewContent').innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetch(reportMeta[key].file);
                const text = await response.text();
                document.getElementById('previewContent').innerHTML = markdownToHTML(text);
            } catch (e) {
                document.getElementById('previewContent').innerHTML = '<div class="loading" style="color:red;">加载失败，请刷新页面重试</div>';
            }
        }
        
        function markdownToHTML(md) {
            let html = md;
            
            // Clean markdown syntax
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Tables
            const tableRegex = /(\|.+\|.+\n)+\n/g;
            html = html.replace(tableRegex, function(match) {
                const lines = match.trim().split('\n');
                let table = '<table>';
                lines.forEach((line, i) => {
                    const cells = line.split('|').filter(c => c.trim());
                    if (i === 0 || (i > 0 && !line.includes('---'))) {
                        table += '<tr>';
                        cells.forEach(c => table += `<td>${c.trim()}</td>`);
                        table += '</tr>';
                    }
                });
                table += '</table>';
                return table;
            });
            
            // Lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            
            // Cleanup
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1234]>)/g, '$1');
            html = html.replace(/(<\/h[1234]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1');
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<table>)/g, '$1');
            html = html.replace(/(<\/table>)<\/p>/g, '$1');
            
            return html;
        }
        
        // Init
        renderCalendar();
        showReport('coffee');
    </script>
