<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四大板块深度研报</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f3f3f3;
      --fg: #1f2328;
      --fg-secondary: #656d76;
      --border: #d0d7de;
      --accent: #0969da;
      --accent-soft: #ddf4ff;
      --danger: #cf222e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      padding-bottom: 14px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      color: var(--fg-secondary);
      font-size: 13px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }

    .sidebar,
    .preview {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .calendar-wrap {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .calendar-title {
      font-size: 12px;
      color: var(--fg-secondary);
    }

    .calendar-nav button {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day-head {
      text-align: center;
      font-size: 11px;
      color: var(--fg-secondary);
      padding: 4px 0;
    }

    .calendar-day {
      border: 1px solid var(--border);
      border-radius: 4px;
      min-height: 30px;
      font-size: 11px;
      background: var(--bg);
      cursor: pointer;
      padding: 3px 4px;
      text-align: left;
    }

    .calendar-day.other {
      color: #9aa1a8;
      cursor: default;
      background: var(--bg-secondary);
    }

    .calendar-day.has-update {
      border-color: var(--accent);
      font-weight: 600;
      position: relative;
    }

    .calendar-day.has-update::after {
      content: "";
      position: absolute;
      right: 4px;
      top: 4px;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
    }

    .calendar-day.selected {
      background: var(--accent-soft);
    }

    .archive,
    .reports {
      border-top: 1px solid var(--border);
    }

    .archive-list,
    .report-list {
      max-height: 220px;
      overflow-y: auto;
    }

    .archive-item,
    .report-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .archive-item:hover,
    .report-item:hover {
      background: var(--bg-secondary);
    }

    .archive-item.active,
    .report-item.active {
      background: var(--accent-soft);
    }

    .row-main {
      font-size: 13px;
      font-weight: 500;
    }

    .row-sub {
      margin-top: 2px;
      font-size: 11px;
      color: var(--fg-secondary);
    }

    .preview-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .preview-body {
      padding: 16px;
      max-height: 75vh;
      overflow-y: auto;
    }

    .loading,
    .error,
    .empty {
      color: var(--fg-secondary);
      font-size: 13px;
      padding: 12px;
    }

    .error {
      color: var(--danger);
    }

    .preview-body h1 {
      font-size: 22px;
      margin: 0 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .preview-body h2 {
      font-size: 18px;
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .preview-body h3 {
      font-size: 16px;
      margin: 16px 0 8px;
    }

    .preview-body p {
      margin: 10px 0;
      font-size: 14px;
    }

    .preview-body ul,
    .preview-body ol {
      margin: 8px 0 8px 22px;
    }

    .preview-body code {
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 4px;
      font-family: Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .preview-body pre {
      background: #f6f8fa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .preview-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
    }

    .preview-body th,
    .preview-body td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
    }

    .preview-body th {
      background: var(--bg-secondary);
    }

    .preview-body a {
      color: var(--accent);
      text-decoration: none;
    }

    .preview-body a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 16px;
      font-size: 12px;
      color: var(--fg-secondary);
      text-align: center;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .archive-list,
      .report-list {
        max-height: 180px;
      }

      .preview-body {
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>四大板块深度研报</h1>
      <p class="subtitle">按日期归档 · 日历联动 · 每日自动更新</p>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="section-title">更新日历</div>
        <div class="calendar-wrap">
          <div class="calendar-head">
            <div class="calendar-title" id="calendarTitle">-</div>
            <div class="calendar-nav">
              <button id="prevMonth" type="button">◀</button>
              <button id="nextMonth" type="button">▶</button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <section class="archive">
          <div class="section-title">日期归档</div>
          <div class="archive-list" id="archiveList">
            <div class="loading">加载中...</div>
          </div>
        </section>

        <section class="reports">
          <div class="section-title" id="reportsTitle">当日研报</div>
          <div class="report-list" id="reportList">
            <div class="loading">加载中...</div>
          </div>
        </section>
      </aside>

      <section class="preview">
        <div class="preview-head" id="previewTitle">请选择研报</div>
        <article class="preview-body" id="previewBody">
          <div class="empty">左侧选择日期和研报后，这里会显示 Markdown 预览。</div>
        </article>
      </section>
    </main>

    <footer>
      内容来自仓库 Markdown 文件，GitHub Pages 自动部署
    </footer>
  </div>

  <script>
    const state = {
      reports: [],
      grouped: new Map(),
      dates: [],
      selectedDate: null,
      selectedReportPath: null,
      currentMonth: new Date(),
    };

    const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatCNDate(dateKey) {
      const [y, m, d] = dateKey.split('-');
      return `${y}年${Number(m)}月${Number(d)}日`;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function markdownToHTML(md) {
      let text = escapeHtml(md);

      text = text.replace(/```([\s\S]*?)```/g, function(_, code) {
        return `<pre><code>${code}</code></pre>`;
      });

      text = text.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      text = text.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      text = text.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      text = text.replace(/(?:^|\n)-(.*(?:\n-.*)*)/g, function(block) {
        const items = block
          .trim()
          .split(/\n/)
          .map(function(line) { return line.replace(/^-\s*/, '').trim(); })
          .filter(Boolean)
          .map(function(item) { return `<li>${item}</li>`; })
          .join('');
        return `\n<ul>${items}</ul>`;
      });

      text = text.replace(/(?:^|\n)\|(.*\|.*)(?:\n\|(?:\s*:?-+:?\s*\|)+)([\s\S]*?)(?=\n\n|$)/g, function(match, header, rows) {
        const heads = header.split('|').map(function(v) { return v.trim(); }).filter(Boolean);
        const bodyRows = rows
          .trim()
          .split('\n')
          .filter(Boolean)
          .map(function(row) {
            const cells = row.split('|').map(function(v) { return v.trim(); }).filter(Boolean);
            return `<tr>${cells.map(function(c) { return `<td>${c}</td>`; }).join('')}</tr>`;
          })
          .join('');
        return `<table><thead><tr>${heads.map(function(h) { return `<th>${h}</th>`; }).join('')}</tr></thead><tbody>${bodyRows}</tbody></table>`;
      });

      const lines = text.split(/\n/);
      const html = [];
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          continue;
        }
        if (/^<(h1|h2|h3|ul|li|pre|table|thead|tbody|tr|th|td|\/ul|\/pre|\/table)/.test(trimmed)) {
          html.push(trimmed);
        } else {
          html.push(`<p>${trimmed}</p>`);
        }
      }
      return html.join('\n');
    }

    function groupReports(reports) {
      const grouped = new Map();
      for (const item of reports) {
        if (!grouped.has(item.date)) {
          grouped.set(item.date, []);
        }
        grouped.get(item.date).push(item);
      }
      return grouped;
    }

    function setDefaultSelection() {
      if (state.dates.length === 0) {
        state.selectedDate = null;
        state.selectedReportPath = null;
        return;
      }
      state.selectedDate = state.dates[0];
      const firstList = state.grouped.get(state.selectedDate) || [];
      state.selectedReportPath = firstList.length ? firstList[0].path : null;
      state.currentMonth = new Date(`${state.selectedDate}T00:00:00`);
    }

    function renderArchive() {
      const list = document.getElementById('archiveList');
      if (state.dates.length === 0) {
        list.innerHTML = '<div class="empty">暂无可展示的研报。</div>';
        return;
      }

      list.innerHTML = state.dates.map(function(dateKey) {
        const active = dateKey === state.selectedDate ? ' active' : '';
        const count = (state.grouped.get(dateKey) || []).length;
        return `
          <div class="archive-item${active}" data-date="${dateKey}">
            <div class="row-main">${formatCNDate(dateKey)}</div>
            <div class="row-sub">${count} 篇</div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.archive-item').forEach(function(el) {
        el.addEventListener('click', function() {
          const dateKey = el.dataset.date;
          selectDate(dateKey, true);
        });
      });
    }

    function renderReportList() {
      const title = document.getElementById('reportsTitle');
      const list = document.getElementById('reportList');

      if (!state.selectedDate) {
        title.textContent = '当日研报';
        list.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }

      const reports = state.grouped.get(state.selectedDate) || [];
      title.textContent = `${formatCNDate(state.selectedDate)} 研报`;

      if (reports.length === 0) {
        list.innerHTML = '<div class="empty">该日期无研报</div>';
        return;
      }

      list.innerHTML = reports.map(function(item) {
        const active = item.path === state.selectedReportPath ? ' active' : '';
        return `
          <div class="report-item${active}" data-path="${item.path}">
            <div class="row-main">${item.title}</div>
            <div class="row-sub">${item.path}</div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.report-item').forEach(function(el) {
        el.addEventListener('click', function() {
          state.selectedReportPath = el.dataset.path;
          renderReportList();
          renderPreview();
        });
      });
    }

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const title = document.getElementById('calendarTitle');

      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();
      title.textContent = `${year}年${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const prevMonthDays = new Date(year, month, 0).getDate();

      const cells = [];
      for (const d of dayNames) {
        cells.push(`<div class="calendar-day-head">${d}</div>`);
      }

      for (let i = firstDay - 1; i >= 0; i -= 1) {
        cells.push(`<button class="calendar-day other" type="button" disabled>${prevMonthDays - i}</button>`);
      }

      for (let d = 1; d <= daysInMonth; d += 1) {
        const dateKey = `${year}-${pad(month + 1)}-${pad(d)}`;
        const has = state.grouped.has(dateKey);
        const selected = dateKey === state.selectedDate;
        const className = `calendar-day${has ? ' has-update' : ''}${selected ? ' selected' : ''}`;
        cells.push(`<button class="${className}" data-date="${dateKey}" type="button">${d}</button>`);
      }

      const totalFilled = firstDay + daysInMonth;
      const remain = (7 - (totalFilled % 7)) % 7;
      for (let d = 1; d <= remain; d += 1) {
        cells.push(`<button class="calendar-day other" type="button" disabled>${d}</button>`);
      }

      grid.innerHTML = cells.join('');
      grid.querySelectorAll('button[data-date]').forEach(function(el) {
        el.addEventListener('click', function() {
          selectDate(el.dataset.date, false);
        });
      });
    }

    function renderPreview() {
      const previewTitle = document.getElementById('previewTitle');
      const previewBody = document.getElementById('previewBody');

      if (!state.selectedReportPath) {
        previewTitle.textContent = '请选择研报';
        previewBody.innerHTML = '<div class="empty">该日期暂无可预览文档。</div>';
        return;
      }

      const report = state.reports.find(function(item) {
        return item.path === state.selectedReportPath;
      });

      if (!report) {
        previewTitle.textContent = '文档不存在';
        previewBody.innerHTML = '<div class="error">未找到对应文档，请刷新页面。</div>';
        return;
      }

      previewTitle.textContent = report.title;
      previewBody.innerHTML = '<div class="loading">加载中...</div>';

      fetch(report.path, { cache: 'no-store' })
        .then(function(res) {
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          return res.text();
        })
        .then(function(text) {
          previewBody.innerHTML = markdownToHTML(text);
        })
        .catch(function(err) {
          previewBody.innerHTML = `<div class="error">加载失败：${err.message}</div>`;
        });
    }

    function selectDate(dateKey, alignMonth) {
      state.selectedDate = dateKey;
      const dayReports = state.grouped.get(dateKey) || [];
      state.selectedReportPath = dayReports.length ? dayReports[0].path : null;

      if (alignMonth) {
        const [y, m] = dateKey.split('-');
        state.currentMonth = new Date(Number(y), Number(m) - 1, 1);
      }

      renderArchive();
      renderReportList();
      renderCalendar();
      renderPreview();
    }

    function changeMonth(delta) {
      state.currentMonth = new Date(
        state.currentMonth.getFullYear(),
        state.currentMonth.getMonth() + delta,
        1
      );
      renderCalendar();
    }

    function bindNav() {
      document.getElementById('prevMonth').addEventListener('click', function() {
        changeMonth(-1);
      });
      document.getElementById('nextMonth').addEventListener('click', function() {
        changeMonth(1);
      });
    }

    async function init() {
      bindNav();
      const archiveList = document.getElementById('archiveList');
      const reportList = document.getElementById('reportList');

      try {
        const res = await fetch('reports-manifest.json', { cache: 'no-store' });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        state.reports = Array.isArray(data.reports) ? data.reports : [];
      } catch (err) {
        archiveList.innerHTML = `<div class="error">清单加载失败：${err.message}</div>`;
        reportList.innerHTML = '<div class="empty">请检查 GitHub Actions 是否执行成功。</div>';
        return;
      }

      state.grouped = groupReports(state.reports);
      state.dates = Array.from(state.grouped.keys()).sort(function(a, b) {
        return b.localeCompare(a);
      });

      setDefaultSelection();
      renderArchive();
      renderReportList();
      renderCalendar();
      renderPreview();
    }

    init();
  </script>
</body>
</html>
